name: Plugin Quality

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Codex plugin quality gate
        uses: hashgraph-online/hol-codex-plugin-scanner-action@96be8481ea907181448505898becbd7827da13e8
        with:
          plugin_dir: "."
          fail_on_severity: high
